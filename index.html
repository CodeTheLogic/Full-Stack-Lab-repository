<!DOCTYPE html>
<html>
<head>
    <title>Student Registration Form</title>

    <link rel="stylesheet" href="style.css">

    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
</head>

<body>

<div class="container">

<h1 id="heading">Student Registration Form</h1>

<img id="myImage" src="https://via.placeholder.com/150" alt="Student Image">

<button class="image-btn" onclick="changeImage()">Change Image</button>

<p class="info">Please fill all details carefully.</p>

<form onsubmit="return validateForm()">

    <label>Username</label>
    <input type="text" id="username">

    <label>Email</label>
    <input type="text" id="email">

    <label>Phone Number</label>
    <input type="text" id="phone">

    <label>Zip Code</label>
    <input type="text" id="zip">

    <label>Password</label>
    <input type="password" id="password">

    <label>Confirm Password</label>
    <input type="password" id="confirmPassword">

    <div class="btn-group">
        <button type="submit" id="submitBtn">Submit</button>
        <button type="reset">Reset</button>
    </div>

</form>

<div class="dom-buttons">
    <button onclick="addText()">Add Text Node</button>
    <button onclick="deleteText()">Delete Text Node</button>
</div>

<div id="demo"></div>

</div>

<script src="script.js"></script>

</body>
</html>
